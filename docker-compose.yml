version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: imob-pro-postgres
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - imob_internal_network
    labels:
      - "traefik.enable=false"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: imob-pro-app
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - proxy_network
      - imob_internal_network
    ports:
      - "3000:3000"
    environment:
      # Database
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public

      # Authentication (Clerk)
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}

      # Storage (RustFS / S3) - Padrão 1 (lib/rust/client.ts)
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY}
      - RUSTFS_ENDPOINT_URL=${RUSTFS_ENDPOINT_URL}
      - RUSTFS_BUCKET=${RUSTFS_BUCKET}

      # Storage (RustFS / S3) - Padrão 2 (lib/storage.ts usado em vistorias)
      - RUSTFS_ENDPOINT=${RUSTFS_ENDPOINT:-${RUSTFS_ENDPOINT_URL}}
      - RUSTFS_ACCESS_KEY_ID=${RUSTFS_ACCESS_KEY_ID:-${RUSTFS_ACCESS_KEY}}
      - RUSTFS_SECRET_ACCESS_KEY=${RUSTFS_SECRET_ACCESS_KEY:-${RUSTFS_SECRET_KEY}}
      - RUSTFS_BUCKET_NAME=${RUSTFS_BUCKET_NAME:-${RUSTFS_BUCKET}}

      # Next.js configurations
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.imob-pro.rule=Host(`imobpro.euatendo.online`)"
      - "traefik.http.routers.imob-pro.entrypoints=websecure"
      - "traefik.http.routers.imob-pro.tls=true"
      - "traefik.http.routers.imob-pro.tls.certresolver=lets-encrypt"
      - "traefik.http.services.imob-pro.loadbalancer.server.port=3000"
      - "traefik.docker.network=proxy_network"

  rustfs:
    image: rustfs/rustfs:latest
    container_name: imobpro-storages3
    restart: unless-stopped
    ports:
      - "9001:9001"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY}
      - ENABLE_CONSOLE=true
    volumes:
      - rustfs_data:/data
    networks:
      - imob_internal_network

volumes:
  postgres_data:
    name: imob-pro-postgres-data
  rustfs_data:
    name: imob-pro-rustfs-data

networks:
  imob_internal_network:
    driver: bridge
    name: imob-pro-internal-network
  proxy_network:
    external: true
